kind: feature

summary: Add HTTP state store inspector for browsing and deleting internal beat states

description: |
  Add a new HTTP endpoint for inspecting and manipulating the beat's internal
  state store. When enabled via `http.state_inspector.enabled: true`, the
  following endpoints become available:
    - GET /store-inspector/states — JSON dump of all states
    - GET /store-inspector/states.html — Web UI for browsing and deleting states
    - DELETE /store-inspector/states/<key> — Remove a specific state entry
  The inspector is available for all beats. Beats that use a state store
  (e.g. Filebeat) expose their actual data; others return empty results.

component: libbeat
