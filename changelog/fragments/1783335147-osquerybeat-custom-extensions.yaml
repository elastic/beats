# REQUIRED
kind: enhancement

# REQUIRED
summary: Add support for loading customer-managed osquery extensions via `elastic_options.extensions`

# OPTIONAL
description: >
  osquerybeat can now autoload customer-managed osquery extensions configured through
  `osquery.elastic_options.extensions.paths`. Each entry may be a directory (scanned for extension
  binaries), a specific extension binary file, or a glob pattern; resolved binaries on the endpoint
  (never copied into the Elastic Agent install directory) are appended to the runtime autoload file
  after the mandatory Elastic extension. Symlinks are rejected for security. Missing,
  non-executable, or unsafe binaries are skipped and logged without aborting osqueryd. Optional
  `timeout` and `require` settings map to osquery's `extensions_timeout` and `extensions_require`.
  Discovered/loaded extensions are reported in the `osquery_extensions` agent diagnostics and in
  the `osqueryd.extensions.loaded`/`osqueryd.extensions.skipped` monitoring metrics. These
  extensions are not supported by Elastic.

# REQUIRED
component: osquerybeat
