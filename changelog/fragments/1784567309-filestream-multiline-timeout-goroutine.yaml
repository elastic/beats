# Kind can be one of:
# - breaking-change: a change to previously-documented behavior
# - deprecation: functionality that is being removed in a later release
# - bug-fix: fixes a problem in a previous version
# - enhancement: extends functionality but does not break or fix existing behavior
# - feature: new functionality
# - known-issue: problems that we are aware of in a given version
# - security: impacts on the security of a product or a user's deployment.
# - upgrade: important information for someone upgrading from a prior version
# - other: does not fit into any of the other categories
kind: enhancement

# Change summary; a 80ish characters long description of the change.
summary: Remove the multiline timeout read-ahead goroutine in favor of a synchronous read deadline

# Long description; in case the summary is not enough to describe the change
# this field accommodate a description without length limits.
description: >
  The multiline TimeoutReader no longer spawns a background read-ahead goroutine
  to enforce multiline.timeout. It now bounds the wait synchronously via a new
  reader.DeadlineSetter capability that delegates down the reader/parser chain to
  the source (the filestream reader, the log input, journald, and kafka), which
  bounds its own blocking read and returns reader.ErrReadDeadline when the
  deadline elapses. This removes a lock-step goroutine ping-pong that spent ~82%
  of multiline CPU parking and waking threads, cutting multiline read-path CPU
  and latency with no change in behavior. Per-source deadline timers are reused
  to keep the read path allocation-free.

# Affected component; a word indicating the component this changeset affects.
component: filebeat

