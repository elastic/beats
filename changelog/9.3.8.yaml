    - kind: bug-fix
      summary: Avoid slice-bounds panic when sorting copytruncate rotated files by date
      description: |
        When the filestream copytruncate prospector sorts rotated files using a date format, `dateSorter.GetTs` sliced the file path by the format length without checking the path was long enough. A path shorter than the configured date format triggered a "slice bounds out of range" panic inside a prospector goroutine, crashing the process. GetTs now returns a zero time for paths shorter than the format, mirroring the existing parse-failure path.
      component: filebeat
      pr:
        - https://github.com/elastic/beats/pull/51570
      issue: []
      impact: ""
