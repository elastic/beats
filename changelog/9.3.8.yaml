    - kind: enhancement
      summary: Add consumer-group and network timeout options to the Filebeat Kafka input.
      description: |
        The Filebeat Kafka input now exposes the `session_timeout`, `heartbeat_interval`, `timeout` and `keep_alive` options, which are passed through to the underlying Sarama consumer (`Consumer.Group.Session.Timeout`, `Consumer.Group.Heartbeat.Interval` and the `Net` dial/read/write timeouts). Previously these were pinned to Sarama's defaults with no way to override them, which prevented tuning consumers that read across higher-latency (cross-region/WAN) links. Defaults are unchanged.
