    - kind: bug-fix
      summary: Load the Npcap wpcap.dll lazily to avoid blocking Npcap upgrades on Windows
      description: |
        On Windows, importing gopacket/pcap loaded wpcap.dll in the package init, so every Beat that links Packetbeat's capture code held the DLL open even when it never captured traffic. This stopped Packetbeat from replacing wpcap.dll while upgrading Npcap and the install failed. The DLL is now loaded lazily, only when Packetbeat needs it.
      component: packetbeat
      pr:
        - https://github.com/elastic/beats/pull/51716
      issue:
        - https://github.com/elastic/elastic-agent/issues/14517
      impact: ""
      action: ""
      timestamp: 1783113269
      file:
        name: 1783113269-fix-packetbeat-lazy-load-wpcap-dll.yaml
        checksum: 6ca81c676c7d94c1af189ef195fb88b50c8f3c71
    - kind: bug-fix
      summary: Fix winlog input crash and event loss during shutdown
      description: |
        The winlog input could crash with a native access violation (0xc0000005) during shutdown when the event log was closed while a Read was still rendering an event. The event log was closed asynchronously from a context-cancellation callback on a different goroutine than the read loop, so closing freed the native Windows Event Log handles (subscription, render contexts and publisher metadata) while in-flight EvtRender/EvtFormatMessage calls were still using them. The crash restarted the component and dropped in-flight events. The event log is now closed on the same goroutine as the read loop, after it has stopped, eliminating the race.
      component: filebeat
      pr:
        - https://github.com/elastic/beats/pull/51728
      issue: []
      impact: ""
      action: ""
      timestamp: 1783321186
      file:
        name: 1783321186-fix-winlog-shutdown-render-crash.yaml
        checksum: c3dbb91d50c9b4dbd7fe82e6abeadf42349541f8
