    - kind: bug-fix
      summary: Fix filestream data loss when a harvester closes before ingesting any data
      description: |
        When a filestream harvester was closed before ingesting anything (for example while still in its initial backoff), it reported an ingested offset of 0. The file watcher could not distinguish this genuine 0 from "no offset reported", so it fell back to the file size and never emitted a write event. As a result no new harvester was started and the file's contents were never ingested, causing silent data loss. The reported offset of 0 is now honored, so a new harvester is started and the file is ingested.
      component: filebeat
      pr:
        - https://github.com/elastic/beats/pull/51675
      issue: []
      impact: ""
      action: ""
      timestamp: 1782902506
      file:
        name: 1782902506-fix-filestream-offset-0-harvester-close.yaml
        checksum: 4e0162f0819026c2b9c0640987d2154bbc5d13a2
    - kind: enhancement
      summary: Add a configurable retry policy to the Azure Blob Storage input.
      description: |
        The `azure-blob-storage` input now exposes a `retry` configuration block (`max_retries`, `initial_retry_delay` and `max_retry_delay`) that tunes the Azure SDK retry policy. Because the policy lives in the client request pipeline, it now covers blob listing (pagination) in addition to downloads; previously a transient error such as an HTTP 503 `ServerBusy` during listing could exhaust the small, non-configurable default retries and stop the input. The settings apply per storage account. Defaults are unchanged when the block is omitted. Additionally, when polling is enabled, a transient blob-listing failure that outlives the retries (503, 429 or a network timeout) is now non-fatal: the input is marked degraded and retries on the next poll interval instead of exiting, so longer outages are ridden out. Permanent failures such as a missing container still stop the input.
      component: filebeat
      pr:
        - https://github.com/elastic/beats/pull/51701
      issue:
        - https://github.com/elastic/beats/issues/44629
      impact: ""
      action: ""
      timestamp: 1783054266
      file:
        name: 1783054266-azureblobstorage-configurable-retries.yaml
        checksum: f467e74d3ff416caec3f367a95f68f39d835d036
