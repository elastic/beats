    - kind: bug-fix
      summary: Make the CrowdStrike streaming input self-heal from transient discover failures.
      description: |
        Transient connection-level failures from the CrowdStrike discover endpoint
        (an empty 200 body, network errors and timeouts) are now retried indefinitely
        with capped back-off instead of counting toward max_attempts and terminating
        the input, so the input self-heals once the upstream recovers rather than
        needing an agent restart. Termination is reserved for genuine hard errors
        (origin mismatch, publish failure); other soft errors, including OAuth auth
        failures from bad credentials, still honour the configured attempt limit.
      component: filebeat
      pr:
        - https://github.com/elastic/beats/pull/51737
      issue: []
      impact: ""
      action: ""
      timestamp: 1783326685
      file:
        name: 1783326685-crowdstrike-streaming-self-heal-transient.yaml
        checksum: bb7102166aeafd0ee6d6dde6a24422c1f8cdb619
    - kind: enhancement
      summary: Add `group_instance_id` (KIP-345 static group membership) to the Filebeat Kafka input.
      description: |
        The Filebeat Kafka input now exposes `group_instance_id`, wired to Sarama's `Consumer.Group.InstanceId`. Setting a stable, unique id per consumer instance enables Kafka static group membership (KIP-345): a member that restarts and rejoins within `session_timeout` is recognized as the same member, avoiding the rebalance storms that dynamic membership causes during rolling restarts of multi-replica deployments. Requires `version` >= 2.3.0. Unset by default, so existing behavior is unchanged.
      component: filebeat
      pr:
        - https://github.com/elastic/beats/pull/51772
      issue:
        - https://github.com/elastic/beats/issues/51768
      impact: ""
      action: ""
