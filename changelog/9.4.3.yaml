    - kind: bug-fix
      summary: Fix Okta entity analytics OAuth2 jwk_json token refresh failure.
      description: |
        The legacy Okta entity analytics provider did not store the JWK bytes when
        oauth2.jwk_json was configured, causing token refresh to fail with
        "error decoding JWK: unexpected end of JSON input". Also add a cached-token
        validity check to avoid regenerating the JWT on every API request.
      component: filebeat
      pr: []
      issue:
        - https://github.com/elastic/beats/issues/50949
      impact: ""
      action: ""
      timestamp: 1780465416
      file:
        name: 1780465416-fix-okta-jwk-json-refresh.yaml
        checksum: cb18a3c043a452d095aeb76c382ff7098d672bf0
    - kind: bug-fix
      summary: Cache Okta OAuth2 token in cel and httpjson to avoid unnecessary JWT regeneration.
      description: |
        The oktaTokenSource.Token() method in the cel and httpjson inputs
        unconditionally regenerated a JWT and exchanged it for a bearer token
        on every call, even when the cached token was still valid. Add a
        token validity check to skip regeneration when unnecessary.
      component: filebeat
      pr: []
      issue: []
      impact: ""
      action: ""
      timestamp: 1780465909
      file:
        name: 1780465909-okta-oauth2-token-cache.yaml
        checksum: fee3faafc609425f5afb7b3cec6e2e53a0185651
