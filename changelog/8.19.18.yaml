version: 8.19.18
entries:
    - kind: bug-fix
      summary: Fix max_body_bytes setting not working without HMAC and add missing documentation configuration options in HTTP Endpoint input.
      description: |
        Previously, the max_body_bytes setting was only applied during HMAC validation, meaning it had no effect on requests that didn't use HMAC authentication.
        This fix ensures that body size limiting is applied to all incoming requests regardless of authentication method.
        Additionally, restored missing documentation for the max_body_bytes setting in the HTTP Endpoint input.
      component: filebeat
      pr:
        - https://github.com/elastic/beats/pull/48550
      issue:
        - https://github.com/elastic/beats/issues/48512
      impact: ""
      action: ""
      timestamp: 1770015799
      file:
        name: 1770015799-fix-max-body-bytes-functionality-and-documentation.yaml
        checksum: f6765700ac7ec72cc9133b48a6146e82d22e2631
