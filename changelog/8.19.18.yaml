    - kind: bug-fix
      summary: Restore `tls.*` certificate metadata for HTTP monitors using `max_redirects > 0`
      description: |
        HTTP monitors that follow redirects (or use a proxy) stopped exporting `tls.*` fields after the 8.0 migration to elastic-agent-libs, because the shared HTTP transport wrapped the TLS connection in a way that prevented Go's net/http from populating `Response.TLS`. This restores TLS certificate metadata (including certificate expiry) for redirecting HTTPS endpoints.
      component: heartbeat
      pr:
        - https://github.com/elastic/beats/pull/51433
        - https://github.com/elastic/beats/pull/51520
        - https://github.com/elastic/beats/pull/51041
