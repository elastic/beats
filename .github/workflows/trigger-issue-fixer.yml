name: Issue Fixer
on:
  issues:
    types: [opened]

permissions:
  actions: read
  contents: read
  discussions: write
  issues: write
  pull-requests: write

jobs:
  flaky-test-fixer:
    if: contains(github.event.issue.labels.*.name, 'flaky-test')
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-issue-fixer.lock.yml@v0
    with:
      allowed-bot-users: "github-actions[bot],elastic-vault-github-plugin-prod[bot]"
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
