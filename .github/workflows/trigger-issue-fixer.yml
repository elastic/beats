name: Issue Fixer
on:
  issues:
    types: [labeled]

permissions:
  actions: read
  contents: write
  copilot-requests: write
  discussions: write
  issues: write
  pull-requests: write

jobs:
  flaky-test-fixer:
    if: contains(github.event.issue.labels.*.name, 'flaky-test') && contains(github.event.issue.labels.*.name, 'triaged')
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-issue-fixer.lock.yml@v0
    with:
      allowed-bot-users: "github-actions[bot],elastic-vault-github-plugin-prod[bot]"
      additional-instructions: |
        Use `skip-changelog` and `backport-active-all` labels when creating the pull request.
