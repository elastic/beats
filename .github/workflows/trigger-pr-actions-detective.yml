name: PR Actions Detective
on:
  workflow_run:
    workflows: ["check-default", "pre-commit", "golangci-lint", "check-docs", "check-dev-tools"]
    types: [completed]

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read

jobs:
  check-pr-author-association:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      toJSON(github.event.workflow_run.pull_requests) != '[]'
    runs-on: ubuntu-latest
    outputs:
      is_allowed: ${{ steps.check.outputs.is_allowed }}
    steps:
      - id: check
        uses: actions/github-script@v7
        with:
          script: |
            const allowed = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);
            const prs = context.payload.workflow_run.pull_requests || [];
            let isAllowed = false;
            for (const pr of prs) {
              const { data } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              });
              if (allowed.has(data.author_association)) {
                isAllowed = true;
                break;
              }
            }
            core.setOutput('is_allowed', String(isAllowed));

  run:
    needs: [check-pr-author-association]
    if: ${{ needs.check-pr-author-association.outputs.is_allowed == 'true' }}
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-pr-actions-detective.lock.yml@v0
    with:
      setup-commands: |
        sudo apt-get update && sudo apt-get install -y libpcap-dev librpm-dev python3-venv
        make mage
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
