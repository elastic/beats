services:
  # This is a proxy used to block beats until all services are healthy.
  # See: https://github.com/docker/compose/issues/4369
  proxy_dep:
    image: busybox
    depends_on:
      elasticsearch: { condition: service_healthy }
      heartbeat_kerberos: { condition: service_healthy }

  # MIT KDC + SPNEGO-protected HTTP server for the HTTP monitor Kerberos
  # integration test. KDC is exposed on 1088 (matching testdata/krb5.conf) and
  # the SPNEGO endpoint on 8080.
  heartbeat_kerberos:
    build: ${ES_BEATS}/testing/environments/docker/heartbeat_kerberos
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/88 && </dev/tcp/127.0.0.1/8080'"]
      retries: 300
      interval: 1s
      start_period: 30s
    ports:
      - 1088:88
      - 1088:88/udp
      - 8080:8080

  elasticsearch:
    extends:
      file: ${ES_BEATS}/testing/environments/${STACK_ENVIRONMENT}.yml
      service: elasticsearch
    healthcheck:
      test: ["CMD-SHELL", "curl -u admin:testing -s http://localhost:9200/_cat/health?h=status | grep -q green"]
      retries: 300
      interval: 1s
    ports:
      - 9200:9200
