# krb5.conf for the Heartbeat HTTP monitor Kerberos integration test.
# It points at the KDC provided by the heartbeat_kerberos docker fixture, whose
# port 88 is mapped to localhost:1088 (see heartbeat/docker-compose.yml).
[libdefaults]
  default_realm = EXAMPLE.COM
  dns_lookup_kdc = false
  dns_lookup_realm = false
  # Force TCP so the single mapped Docker port is enough.
  udp_preference_limit = 1
  default_tkt_enctypes = aes256-cts-hmac-sha1-96 aes128-cts-hmac-sha1-96
  default_tgs_enctypes = aes256-cts-hmac-sha1-96 aes128-cts-hmac-sha1-96
  permitted_enctypes = aes256-cts-hmac-sha1-96 aes128-cts-hmac-sha1-96

[realms]
  EXAMPLE.COM = {
    kdc = localhost:1088
  }

[domain_realm]
  localhost = EXAMPLE.COM
  .localhost = EXAMPLE.COM
