services:
  # This is a proxy used to block "docker compose up" until all services are healthy.
  # See: https://github.com/docker/compose/issues/4369
  proxy_dep:
    image: busybox
    depends_on:
      elasticsearch: { condition: service_healthy }
      kibana:        { condition: service_healthy }

  beat:
    build: ../../metricbeat
    environment:
      - BEAT_STRICT_PERMS=false
      - TEST_ENVIRONMENT=false
    working_dir: /go/src/github.com/elastic/beats/x-pack/metricbeat
    volumes:
      - ${PWD}/../..:/go/src/github.com/elastic/beats/
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.docker/config.json:/root/.docker/config.json:ro
    network_mode: host
    command: make

  # Used by base tests
  elasticsearch:
    extends:
      file: ../../metricbeat/docker-compose.yml
      service: elasticsearch

  # Used by base tests
  kibana:
    # Copied configuration from OSS metricbeat because services with depends_on
    # cannot be extended with extends. Keep environment + healthcheck in sync
    # with metricbeat/docker-compose.yml when secured-ES users change.
    image: docker.elastic.co/integrations-ci/beats-kibana:${KIBANA_VERSION:-9.2.2}-1
    build:
      context: ../../metricbeat/module/kibana/_meta
      args:
        KIBANA_VERSION: ${KIBANA_VERSION:-9.2.2}
    environment:
      # Authenticate to the now-secured Elasticsearch as the standard
      # Kibana service account so saved-object migrations succeed and
      # Kibana skips its interactive setup preboot.
      - "ELASTICSEARCH_USERNAME=kibana_system_user"
      - "ELASTICSEARCH_PASSWORD=testing"
    depends_on:
      - elasticsearch
    ports:
      - 5601
