{{ if eq .input "salesforce" }}

id: logout
type: salesforce
enabled: true
{{ if .api_version }}
version: {{ .api_version }}
{{ end }}
auth.oauth2: {{ .authentication | tojson }}
url: {{ .url }}
event_monitoring_method:
  event_log_file:
    enabled: {{ if .event_log_file }}true{{ else }}false{{ end }}
    interval: {{ .elf_interval }}
    query:
      default: SELECT Id,CreatedDate,LogDate,LogFile FROM EventLogFile WHERE {{ if .initial_interval }}CreatedDate > [[ (formatTime (now.Add (parseDuration "-{{ .initial_interval }}")) "2006-01-02T15:04:05.000Z0700") ]] AND{{ end }} Interval = '{{ .log_file_interval }}' AND EventType = 'Logout' ORDER BY CreatedDate ASC NULLS FIRST, Id ASC
      value: SELECT Id,CreatedDate,LogDate,LogFile FROM EventLogFile WHERE Interval = '{{ .log_file_interval }}' AND EventType = 'Logout' AND (CreatedDate > [[ .cursor.event_log_file.last_event_time ]][[ if .cursor.event_log_file.last_event_id ]] OR (CreatedDate = [[ .cursor.event_log_file.last_event_time ]] AND Id > '[[ .cursor.event_log_file.last_event_id ]]')[[ end ]]) ORDER BY CreatedDate ASC NULLS FIRST, Id ASC
    cursor:
      field: "CreatedDate"
  object:
    enabled: {{ if .real_time }}true{{ else }}false{{ end }}
    interval: {{ .real_time_interval }}
    batch:
      enabled: {{ if .real_time }}true{{ else }}false{{ end }}
      initial_interval: {{ if .initial_interval }}{{ .initial_interval }}{{ else }}{{ .real_time_interval }}{{ end }}
      max_windows_per_run: 12
      window: {{ .real_time_interval }}
    query:
      default: SELECT FIELDS(STANDARD) FROM LogoutEvent ORDER BY EventDate DESC
      value: SELECT FIELDS(STANDARD) FROM LogoutEvent WHERE EventDate > [[ .cursor.object.batch_start_time ]] AND EventDate <= [[ .cursor.object.batch_end_time ]] ORDER BY EventDate DESC
    cursor:
      field: "EventDate"

processors:
  - add_fields:
      target: salesforce
      fields:
        instance_url: {{ .url }}
  - add_locale: ~

{{ else if eq .input "file" }}

type: log
paths:
{{ range $i, $path := .paths }}
  - {{$path}}
{{ end }}
exclude_files: [".gz$"]

processors:
  - add_fields:
      target: salesforce
      fields:
        instance_url: {{ .url }}
  - decode_json_fields:
      fields: ["message"]
      target: "json"
  - script:
      lang: javascript
      source: >
        function process(event) {
          if (event.Get("json.EVENT_TYPE") == "Logout") {
            event.Put("event.provider", "EventLogFile");
          } else {
            event.Put("event.provider", "Object");
          }
        }
  - drop_fields:
      fields: json
      ignore_missing: true
  - add_locale: ~

{{ end }}

tags: {{.tags | tojson}}
publisher_pipeline.disable_host: {{ inList .tags "forwarded" }}
