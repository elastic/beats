filebeat.autodiscover:
  providers:
    - type: docker
      templates:
        - condition:
            contains:
              docker.container.id: {{ .ContainerID }}
          config:
            - type: filestream
              id: "${data.docker.container.id}-logs"
              take_over:
                enabled: true
              file_identity.native: ~
              prospector.scanner.fingerprint.enabled: false
              close.on_state_change.inactive: 2s
              paths:
                - /var/lib/docker/containers/${data.docker.container.id}/*.log
              parsers:
                - container: ~

queue.mem:
  flush.timeout: 0s

path.home: "{{ .HomeFolder }}"

output.file:
  path: ${path.home}
  filename: "output"
  rotate_on_startup: false

logging:
  level: debug
  selectors:
    - "*"
  metrics:
    enabled: false
