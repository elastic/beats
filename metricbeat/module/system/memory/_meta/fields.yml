- name: memory
  type: group
  description: >
    `memory` contains local memory stats.
  release: ga
  fields:
    - name: total
      type: long
      format: bytes
      description: >
        Total memory.

    - name: used.bytes
      type: long
      format: bytes
      description: >
        Used memory.

    - name: free
      type: long
      format: bytes
      description: >
        The total amount of free memory in bytes. This value does not include memory consumed by system caches and
        buffers (see system.memory.actual.free).

    - name: cached
      type: long
      format: bytes
      description: >
        Total Cached memory on system.

    - name: used.pct
      type: scaled_float
      format: percent
      description: >
        The percentage of used memory.

    - name: actual
      type: group
      description: >
        Actual memory used and free.
      fields:

        - name: used.bytes
          type: long
          format: bytes
          description: >
            Actual used memory in bytes. It represents the difference between the total and the available memory. The
            available memory depends on the OS. For more details, please check `system.actual.free`.

        - name: free
          type: long
          format: bytes
          description: >
            Actual free memory in bytes. It is calculated based on the OS. On Linux this value will be MemAvailable from /proc/meminfo,
            or calculated from free memory plus caches and buffers if /proc/meminfo is not available.
            On OSX it is a sum of free memory and the inactive memory. On Windows, it is equal
            to `system.memory.free`.

        - name: used.pct
          type: scaled_float
          format: percent
          description: >
            The percentage of actual used memory.

    - name: swap
      type: group
      prefix: "[float]"
      description: This group contains statistics related to the swap memory usage on the system.
      fields:
        - name: total
          type: long
          format: bytes
          description: >
            Total swap memory.

        - name: used.bytes
          type: long
          format: bytes
          description: >
            Used swap memory.

        - name: free
          type: long
          format: bytes
          description: >
            Available swap memory.

        - name: used.pct
          type: scaled_float
          format: percent
          description: >
            The percentage of used swap memory.

    - name: zswap
      type: group
      description: >
        Metrics for the zswap compressed swap cache. Available on Linux when zswap is enabled.
      fields:
        - name: compressed
          type: long
          format: bytes
          description: >
            Current compressed size of data stored in zswap.

        - name: uncompressed
          type: long
          format: bytes
          description: >
            Original uncompressed size of data stored in zswap.

        - name: debug
          type: group
          description: >
            Detailed zswap statistics from /sys/kernel/debug/zswap.
            Requires debugfs to be mounted and accessible.
          fields:
            - name: decompress_fail
              type: long
              description: >
                Number of load or writeback attempts that failed due to decompression failure.

            - name: pool_limit_hit
              type: long
              description: >
                Number of times the zswap pool limit was hit, as configured by the zswap.max_pool_percent kernel parameter.

            - name: pool_total_size
              type: long
              format: bytes
              description: >
                Total size of the zswap pool in bytes.

            - name: reject_alloc_fail
              type: long
              description: >
                Number of store attempts that failed because the underlying allocator could not get memory.

            - name: reject_compress_fail
              type: long
              description: >
                Number of store attempts that failed due to compression algorithm failure.

            - name: reject_compress_poor
              type: long
              description: >
                Number of store attempts rejected because the compressed page was too big for the allocator to optimally store.

            - name: reject_kmemcache_fail
              type: long
              description: >
                Number of store attempts that failed because the entry metadata could not be allocated (rare).

            - name: reject_reclaim_fail
              type: long
              description: >
                Number of store attempts that failed due to a reclaim failure after pool limit was reached.

            - name: stored_incompressible_pages
              type: long
              description: >
                Number of incompressible pages currently stored in zswap.

            - name: stored_pages
              type: long
              description: >
                Number of pages currently stored in zswap.

            - name: written_back_pages
              type: long
              description: >
                Number of pages written back from zswap to swap when pool limit was reached.
