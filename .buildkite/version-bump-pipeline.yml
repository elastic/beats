notify:
  - slack:
      channels:
        - "#ingest-notifications"
      message: "<!subteam^S01LS4S14FP|agent-team> Version bump to ${NEW_VERSION} — ${BUILDKITE_BUILD_URL}"
    if: (build.branch == 'main' || build.branch =~ /^[0-9]+\.[0-9x]+\$/) && (build.state == 'passed' || build.state == 'failed')
  - slack:
      channels:
        - "#ingest-notifications"
      message: |
        <!subteam^S01LS4S14FP|agent-team>
        🚦 Pipeline waiting for approval 🚦
        Repo: `${REPO}`

        Ready to fetch DRA artifacts - please unblock when ready.
        New version: `${NEW_VERSION}`
        Branch: `${BRANCH}`
        Workflow: `${WORKFLOW}`
        ${BUILDKITE_BUILD_URL}
    if: build.state == "blocked"

steps:
  # Phase 3: trigger ingest-dev release automation for this repository only.
  # Orchestrator env: NEW_VERSION, BRANCH, REPO, WORKFLOW (patch|minor|major).
  - trigger: ingest-dev-pipeline-release-minor-major
    key: bump-version-minor-major
    label: ":rocket: Trigger ingest-dev minor/major release"
    if: build.env("WORKFLOW") == "minor" || build.env("WORKFLOW") == "major"
    build:
      branch: "main"
      message: "Version bump beats to ${NEW_VERSION} (${WORKFLOW})"
      meta_data:
        REPOSITORY: "beats"
        RELEASE_TYPE: "${WORKFLOW}"
        CURRENT_RELEASE: "${NEW_VERSION}"
        DRY_RUN: "false"
        DISABLE_DEV_ISSUE: "true"
        DISABLE_NOTIFICATIONS: "false"
        DISABLE_BRANCH_CREATION: "false"
        DISABLE_PREPARE_NEXT: "false"
        REVIEWERS: "elastic/elastic-agent-release"
        DEV_ISSUE_URL: "https://github.com/elastic/dev/issues/0"

  - trigger: ingest-dev-pipeline-release-patch
    key: bump-version-patch
    label: ":rocket: Trigger ingest-dev patch release"
    if: build.env("WORKFLOW") == "patch"
    build:
      branch: "main"
      message: "Version bump beats to ${NEW_VERSION} (patch)"
      meta_data:
        REPOSITORY: "beats"
        CURRENT_RELEASE: "${NEW_VERSION}"
        DRY_RUN: "false"
        DISABLE_DEV_ISSUE: "true"
        DISABLE_NOTIFICATIONS: "false"
        DISABLE_RELEASE_PREPARE: "false"
        DISABLE_PREPARE_NEXT: "false"
        REVIEWERS: "elastic/elastic-agent-release"
        DEV_ISSUE_URL: "https://github.com/elastic/dev/issues/0"

  - block: "Ready to fetch for DRA artifacts?"
    prompt: |
      Unblock when your team is ready to proceed.

      Trigger parameters:
      - NEW_VERSION: ${NEW_VERSION}
      - BRANCH: ${BRANCH}
      - WORKFLOW: ${WORKFLOW}
    key: block-get-dra-artifacts
    blocked_state: running
    depends_on:
      - bump-version-minor-major
      - bump-version-patch

  - label: "Fetch DRA Artifacts"
    key: fetch-dra-artifacts
    depends_on: block-get-dra-artifacts
    agents:
      image: docker.elastic.co/release-eng/wolfi-build-essential-release-eng:latest
      cpu: 250m
      memory: 512Mi
      ephemeralStorage: 1Gi
    command:
      - echo "Starting DRA artifacts retrieval..."
    timeout_in_minutes: 240
    retry:
      automatic:
        - exit_status: "*"
          limit: 2
      manual:
        permit_on_passed: true

    plugins:
      - elastic/json-watcher#v1.0.0:
          url: "https://artifacts-staging.elastic.co/beats/latest/${BRANCH}.json"
          field: ".version"
          expected_value: "${NEW_VERSION}"
          polling_interval: "30"
      - elastic/json-watcher#v1.0.0:
          url: "https://storage.googleapis.com/elastic-artifacts-snapshot/beats/latest/${BRANCH}.json"
          field: ".version"
          expected_value: "${NEW_VERSION}-SNAPSHOT"
          polling_interval: "30"
