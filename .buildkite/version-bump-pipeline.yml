notify:
  - slack:
      channels:
        - "#ingest-notifications"
      message: "<!subteam^S01LS4S14FP|agent-team> Version bump to ${NEW_VERSION} — ${BUILDKITE_BUILD_URL}"
    if: (build.branch == 'main' || build.branch =~ /^[0-9]+\.[0-9x]+\$/) && (build.state == 'passed' || build.state == 'failed')
  - slack:
      channels:
        - "#ingest-notifications"
      message: |
        <!subteam^S01LS4S14FP|agent-team>
        🚦 Pipeline waiting for approval 🚦
        Repo: `${REPO}`

        Ready to fetch DRA artifacts - please unblock when ready.
        New version: `${NEW_VERSION}`
        Branch: `${BRANCH}`
        Workflow: `${WORKFLOW}`
        ${BUILDKITE_BUILD_URL}
    if: build.state == "blocked"

env:
  ASDF_MAGE_VERSION: "1.15.0"
  IMAGE_BEATS_WITH_HOOKS_LATEST: "docker.elastic.co/ci-agent-images/platform-ingest/buildkite-agent-beats-ci-with-hooks:latest"

steps:
  # BRANCH is major.minor (e.g. 9.4 for a 9.4.0 minor release, 9.3 for a 9.3.3 patch).
  - label: "Bump version minor"
    key: bump-version-minor
    if: build.env("WORKFLOW") == "minor"
    agents:
      image: "${IMAGE_BEATS_WITH_HOOKS_LATEST}"
      cpu: "4000m"
      memory: "8Gi"
      useCustomGlobalHooks: true
    env:
      CURRENT_RELEASE: "${NEW_VERSION}"
    plugins:
      - elastic/vault-github-token#v0.2.1: ~
    command: |
      set -euo pipefail
      make mage
      mage release:runMajorMinor
    timeout_in_minutes: 60

  - label: "Bump version patch"
    key: bump-version-patch
    if: build.env("WORKFLOW") == "patch"
    agents:
      image: "${IMAGE_BEATS_WITH_HOOKS_LATEST}"
      cpu: "4000m"
      memory: "8Gi"
      useCustomGlobalHooks: true
    env:
      CURRENT_RELEASE: "${NEW_VERSION}"
      BASE_BRANCH: "${BRANCH}"
    plugins:
      - elastic/vault-github-token#v0.2.1: ~
    command: |
      set -euo pipefail
      make mage
      mage release:runPatch
    timeout_in_minutes: 60

  - block: "Ready to fetch for DRA artifacts?"
    prompt: |
      Unblock when your team is ready to proceed.

      Trigger parameters:
      - NEW_VERSION: ${NEW_VERSION}
      - BRANCH: ${BRANCH}
      - WORKFLOW: ${WORKFLOW}
    key: block-get-dra-artifacts
    blocked_state: running

  - label: "Fetch DRA Artifacts"
    key: fetch-dra-artifacts
    depends_on: block-get-dra-artifacts
    agents:
      image: docker.elastic.co/release-eng/wolfi-build-essential-release-eng:latest
      cpu: 250m
      memory: 512Mi
      ephemeralStorage: 1Gi
    command:
      - echo "Starting DRA artifacts retrieval..."
    timeout_in_minutes: 240
    retry:
      automatic:
        - exit_status: "*"
          limit: 2
      manual:
        permit_on_passed: true

    plugins:
      - elastic/json-watcher#v1.0.0:
          url: "https://artifacts-staging.elastic.co/beats/latest/${BRANCH}.json"
          field: ".version"
          expected_value: "${NEW_VERSION}"
          polling_interval: "30"
      - elastic/json-watcher#v1.0.0:
          url: "https://storage.googleapis.com/elastic-artifacts-snapshot/beats/latest/${BRANCH}.json"
          field: ".version"
          expected_value: "${NEW_VERSION}-SNAPSHOT"
          polling_interval: "30"
